app = "jlpt-dashboard"
primary_region = "sin"  # Singapore (closest to Pakistan)

[build]

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "jlpt_data"
  destination = "/app/data"
